name: Playwright Smoke Test

on:
  workflow_dispatch:
  pull_request:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Start backend
        working-directory: backend
        run: |
          nohup python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 > ../backend.log 2>&1 &

      - name: Start frontend preview
        run: |
          npm run build
          nohup npm run preview -- --host 127.0.0.1 --port 3000 > ../frontend.log 2>&1 &

      - name: Wait for services
        working-directory: ..
        run: |
          python - <<'PY'
          import time
          import urllib.request

          urls = ["http://127.0.0.1:8000/health", "http://127.0.0.1:3000"]
          for url in urls:
              for _ in range(30):
                  try:
                      urllib.request.urlopen(url, timeout=2)
                      break
                  except Exception:
                      time.sleep(1)
              else:
                  raise SystemExit(f"Service not ready: {url}")
          PY

      - name: Run Playwright smoke test
        run: npm run test:e2e
